<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DigiDrobe — Login</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-page">

    <div class="login-container">
        <div class="login-left">
            <div class="login-card">
                <h1 class="brand">DigiDrobe</h1>

                <!-- Login Form -->
                <div id="loginSection">
                    <p class="login-title">Welcome back — sign in</p>
                    <form id="loginForm" autocomplete="off">
                        <label for="email">Email</label>
                        <input id="email" name="email" type="email" placeholder="you@example.com" required>

                        <label for="password">Password</label>
                        <input id="password" name="password" type="password" placeholder="password" required>

                        <div class="login-row">
                            <label class="remember"><input type="checkbox" id="rememberMe"> Remember</label>
                            <a class="forgot" href="#" id="showForgotBtn">Forgot?</a>
                        </div>

                        <button id="loginBtn" class="btn-auth" type="submit">Log In</button>
                        <div id="msg" class="msg"></div>
                        <p class="auth-small">New here? <a href="signup.html">Create an account</a></p>
                    </form>
                </div>

                <!-- Forgot Password: Step 1 - Enter email -->
                <div id="forgotSection" style="display: none;">
                    <p class="login-title">Reset your password</p>
                    <p class="small muted" style="margin-bottom: 16px;">Enter your email and we'll send you a reset code.</p>

                    <label for="forgotEmail">Email</label>
                    <input id="forgotEmail" type="email" placeholder="you@example.com" required>

                    <button id="sendResetBtn" class="btn-auth" type="button">Send Reset Code</button>
                    <div id="forgotMsg" class="msg"></div>

                    <p class="auth-small"><a href="#" id="backToLoginBtn1">Back to login</a></p>
                </div>

                <!-- Forgot Password: Step 2 - Enter OTP + new password -->
                <div id="resetSection" style="display: none;">
                    <p class="login-title">Enter reset code</p>
                    <p class="small muted" style="margin-bottom: 16px;">We sent a code to <strong id="resetEmailDisplay"></strong></p>

                    <label for="resetCode">Verification code</label>
                    <input id="resetCode" type="text" placeholder="123456" maxlength="6"
                           style="text-align: center; font-size: 24px; letter-spacing: 8px; font-weight: 700;">

                    <label for="newPassword">New password</label>
                    <input id="newPassword" type="password" placeholder="New password (min 6 chars)" minlength="6">

                    <label for="confirmPassword">Confirm password</label>
                    <input id="confirmPassword" type="password" placeholder="Confirm new password" minlength="6">

                    <button id="resetPasswordBtn" class="btn-auth" type="button">Reset Password</button>
                    <div id="resetMsg" class="msg"></div>

                    <p class="auth-small"><a href="#" id="backToLoginBtn2">Back to login</a></p>
                </div>
            </div>
        </div>

        <div class="login-right">
            <div class="right-illustration">
                <img src="assets/pexels-serra-nur-cevikdal-2147703100-32341088.jpg" alt="Boutique storefront" class="illustration">
            </div>
        </div>
    </div>

    <script>
        const API = window.location.origin + '/api';
        let resetEmail = '';

        function showSection(id) {
            ['loginSection', 'forgotSection', 'resetSection'].forEach(s => {
                document.getElementById(s).style.display = s === id ? 'block' : 'none';
            });
        }

        // ---- Login ----
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const msgEl = document.getElementById('msg');
            msgEl.textContent = '';

            try {
                const resp = await fetch(API + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });
                const data = await resp.json();

                if (!resp.ok) {
                    msgEl.textContent = data.error || 'Login failed.';
                    msgEl.style.color = '#ff4b5c';
                    return;
                }

                localStorage.setItem('currentUser', email);
                msgEl.textContent = 'Login successful. Redirecting…';
                msgEl.style.color = '#27AE60';
                setTimeout(() => window.location.href = 'dashboard.html', 450);
            } catch (err) {
                msgEl.textContent = 'Network error. Make sure the server is running.';
                msgEl.style.color = '#ff4b5c';
            }
        });

        // ---- Forgot Password ----
        document.getElementById('showForgotBtn').addEventListener('click', (e) => {
            e.preventDefault();
            showSection('forgotSection');
        });

        document.getElementById('backToLoginBtn1').addEventListener('click', (e) => {
            e.preventDefault();
            showSection('loginSection');
        });

        document.getElementById('backToLoginBtn2').addEventListener('click', (e) => {
            e.preventDefault();
            showSection('loginSection');
        });

        document.getElementById('sendResetBtn').addEventListener('click', async () => {
            const email = document.getElementById('forgotEmail').value.trim().toLowerCase();
            const msgEl = document.getElementById('forgotMsg');
            msgEl.textContent = '';

            if (!email) {
                msgEl.textContent = 'Please enter your email.';
                msgEl.style.color = '#ff4b5c';
                return;
            }

            const btn = document.getElementById('sendResetBtn');
            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                const resp = await fetch(API + '/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email }),
                });
                const data = await resp.json();

                resetEmail = email;
                showSection('resetSection');
                document.getElementById('resetEmailDisplay').textContent = email;
                document.getElementById('resetCode').focus();
            } catch (err) {
                msgEl.textContent = 'Network error.';
                msgEl.style.color = '#ff4b5c';
            }
            btn.disabled = false;
            btn.textContent = 'Send Reset Code';
        });

        // ---- Reset Password ----
        document.getElementById('resetPasswordBtn').addEventListener('click', async () => {
            const code = document.getElementById('resetCode').value.trim();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const msgEl = document.getElementById('resetMsg');
            msgEl.textContent = '';

            if (code.length !== 6) {
                msgEl.textContent = 'Please enter the 6-digit code.';
                msgEl.style.color = '#ff4b5c';
                return;
            }
            if (newPassword.length < 6) {
                msgEl.textContent = 'Password must be at least 6 characters.';
                msgEl.style.color = '#ff4b5c';
                return;
            }
            if (newPassword !== confirmPassword) {
                msgEl.textContent = 'Passwords do not match.';
                msgEl.style.color = '#ff4b5c';
                return;
            }

            try {
                const resp = await fetch(API + '/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: resetEmail, code, newPassword }),
                });
                const data = await resp.json();

                if (!resp.ok) {
                    msgEl.textContent = data.error || 'Reset failed.';
                    msgEl.style.color = '#ff4b5c';
                    return;
                }

                msgEl.textContent = 'Password reset! Redirecting to login...';
                msgEl.style.color = '#27AE60';
                setTimeout(() => showSection('loginSection'), 1500);
            } catch (err) {
                msgEl.textContent = 'Network error.';
                msgEl.style.color = '#ff4b5c';
            }
        });

        document.getElementById('resetCode').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('newPassword').focus();
        });
    </script>
</body>
</html>
