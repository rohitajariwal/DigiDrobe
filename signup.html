<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>DigiDrobe — Sign up</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-body">

  <div class="login-container">
    <div class="login-left">
      <div class="login-card">
        <h1 class="brand">DigiDrobe</h1>
        <p class="login-title">Create your free account</p>

        <form id="signupForm" autocomplete="off">
          <label for="name">Full name</label>
          <input id="name" name="name" type="text" placeholder="Your name" required>

          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" required>

          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="create a password" required>

          <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
            <label style="font-weight: 600; margin-bottom: 12px; display: block;">Body Measurements (optional)</label>
            <p class="small muted" style="margin-bottom: 16px;">Enter your measurements for personalized recommendations</p>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
              <div>
                <label for="heightInput" style="font-size: 13px; font-weight: 500;">Height (cm)</label>
                <input id="heightInput" name="height" type="number" min="100" max="250" step="0.5" placeholder="170" style="width: 100%; padding: 10px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.08); color: var(--text-main); font-size: 14px;">
              </div>
              <div>
                <label for="chestInput" style="font-size: 13px; font-weight: 500;">Chest/Bust (cm)</label>
                <input id="chestInput" name="chest" type="number" min="50" max="200" step="0.5" placeholder="90" style="width: 100%; padding: 10px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.08); color: var(--text-main); font-size: 14px;">
              </div>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
              <div>
                <label for="waistInput" style="font-size: 13px; font-weight: 500;">Waist (cm)</label>
                <input id="waistInput" name="waist" type="number" min="50" max="200" step="0.5" placeholder="72" style="width: 100%; padding: 10px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.08); color: var(--text-main); font-size: 14px;">
              </div>
              <div>
                <label for="hipsInput" style="font-size: 13px; font-weight: 500;">Hips (cm)</label>
                <input id="hipsInput" name="hips" type="number" min="50" max="200" step="0.5" placeholder="95" style="width: 100%; padding: 10px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.08); color: var(--text-main); font-size: 14px;">
              </div>
            </div>
          </div>

          <button id="signupBtn" class="btn-auth" type="submit">Create account</button>

          <div id="msg" class="msg"></div>

          <p class="auth-small">Already a member? <a href="login.html">Log in</a></p>
        </form>
      </div>
    </div>

    <div class="login-right">
      <div class="right-illustration">
        <img src="assets/storefront.jpg" alt="Boutique storefront" class="illustration">
      </div>
    </div>
  </div>

  <script src="local-db-plain.js"></script>
  <script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const rawEmail = document.getElementById('email').value;
      const email = (window.DB && typeof DB.normalizeEmail === 'function') ? DB.normalizeEmail(rawEmail) : (rawEmail || "").trim();
      const password = document.getElementById('password').value;
      const msgEl = document.getElementById('msg');

      // Email validation
      if (window.DB && typeof DB.isValidEmail === 'function') {
        if (!DB.isValidEmail(email)) {
          msgEl.textContent = 'Please enter a valid email address.';
          msgEl.style.color = '#ff4b5c';
          return;
        }
      }

      // Collect measurements as structured object
      const measurementsObj = {};
      const height = parseFloat(document.getElementById('heightInput').value);
      const chest = parseFloat(document.getElementById('chestInput').value);
      const waist = parseFloat(document.getElementById('waistInput').value);
      const hips = parseFloat(document.getElementById('hipsInput').value);
      
      if (height && !isNaN(height)) measurementsObj.height = height;
      if (chest && !isNaN(chest)) measurementsObj.chest = chest;
      if (waist && !isNaN(waist)) measurementsObj.waist = waist;
      if (hips && !isNaN(hips)) measurementsObj.hips = hips;
      
      // Convert to JSON string for storage
      const measurements = Object.keys(measurementsObj).length > 0 
        ? JSON.stringify(measurementsObj) 
        : '';

      // Use DB.createUser or createUser helper if available
      let ok = false;
      try {
        if (typeof createUser === 'function') {
          ok = createUser({ name, email, password, measurements });
        } else if (window.DB && typeof DB.createUser === 'function') {
          ok = DB.createUser({ name, email, password, measurements });
        } else {
          // fallback: store simple user object using DB.addUser or localStorage
          if (window.DB && typeof DB.addUser === 'function') {
            DB.addUser({ name, email, password, measurements });
            ok = true;
          } else {
            // last resort: localStorage (not preferred)
            const users = JSON.parse(localStorage.getItem('DD_users') || '{}');
            if (users[email]) {
              ok = false;
            } else {
              users[email] = { name, email, password, measurements, wardrobe: [] };
              localStorage.setItem('DD_users', JSON.stringify(users));
              ok = true;
            }
          }
        }
      } catch (err) {
        console.error('signup helper error', err);
      }

      if (!ok) {
        msgEl.textContent = (window.DB && DB.lastError) ? DB.lastError : 'User already exists or signup failed';
        msgEl.style.color = '#ff4b5c';
        return;
      }

      localStorage.setItem('currentUser', email);
      msgEl.textContent = 'Account created — redirecting…';
      msgEl.style.color = '#540863';
      setTimeout(() => window.location.href = 'main.html', 600);
    });
  </script>
</body>
</html>
